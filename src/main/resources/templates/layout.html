<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title
	th:text="${pageTitle != null ? pageTitle + ' - ' : ''} + 'Sistema de Biblioteca'">Sistema
	de Biblioteca</title>

<!-- Bootstrap 5 CSS -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Bootstrap Icons -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
	rel="stylesheet">
<!-- CSS customizado -->
<link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
		<div class="container">
			<a class="navbar-brand fw-bold" th:href="@{/}"> <i
				class="bi bi-book-half me-2"></i>Biblioteca
			</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" th:href="@{/}"
						th:classappend="${currentPage == 'home'} ? 'active' : ''"> <i
							class="bi bi-house me-1"></i>Início
					</a></li>
					<li class="nav-item"><a class="nav-link" th:href="@{/livros}"
						th:classappend="${currentPage == 'livros'} ? 'active' : ''"> <i
							class="bi bi-journal-bookmark me-1"></i>Livros
					</a></li>
					<li class="nav-item"><a class="nav-link" th:href="@{/autores}"
						th:classappend="${currentPage == 'autores'} ? 'active' : ''">
							<i class="bi bi-person-lines-fill me-1"></i>Autores
					</a></li>
					<li class="nav-item"><a class="nav-link"
						th:href="@{/emprestimos}"
						th:classappend="${currentPage == 'emprestimos'} ? 'active' : ''">
							<i class="bi bi-arrow-left-right me-1"></i>Empréstimos
					</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Conteúdo principal -->
	<main class="container my-4">
		<!-- Mensagem de alerta (exibida via JavaScript após operações) -->
		<div id="alertBox" class="alert d-none alert-dismissible fade show"
			role="alert">
			<span id="alertMessage"></span>
			<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
		</div>

		<!-- Aqui entra o conteúdo de cada página -->
		<div th:replace="${content}"></div>
	</main>

	<!-- Footer -->
	<footer class="footer bg-light border-top py-3 mt-auto">
		<div class="container text-center text-muted">
			<small>Sistema de Biblioteca 2026 &copy; Autor: Deivid Andrade | Spring Boot +
				Thymeleaf + Bootstrap</small>
		</div>
	</footer>

	<!-- Bootstrap 5 JS -->
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<!-- JavaScript customizado -->
	<script th:src="@{/js/app.js}"></script>
</body>
</html>
